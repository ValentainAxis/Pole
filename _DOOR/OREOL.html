<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>OREOL :: вход</title>

<style>
  html,body{
    margin:0; padding:0;
    width:100%; height:100%;
    background:#000;
    overflow:hidden;
  }

  /* Мягкое дыхание фона */
  @keyframes breath {
    0%   { background:#000; }
    50%  { background:#050505; }
    100% { background:#000; }
  }
  body{
    animation:breath 6s ease-in-out infinite;
  }

  /* Первичное сияние */
  #halo {
    position:absolute;
    top:50%; left:50%;
    width:180px; height:180px;
    margin:-90px 0 0 -90px;
    border-radius:50%;
    background:radial-gradient(circle,
       rgba(255,255,255,0.12) 0%,
       rgba(255,255,255,0.02) 60%,
       rgba(255,255,255,0) 100%
    );
    filter:blur(18px);
    opacity:0;
    animation:haloIn 4s ease forwards;
  }

  @keyframes haloIn {
    0%   { opacity:0; transform:scale(0.92); }
    50%  { opacity:0.25; transform:scale(1.0); }
    100% { opacity:0.15; transform:scale(0.97); }
  }

  /* Тихий вход по клику или клавише */
  #fade {
    position:fixed;
    inset:0;
    background:#000;
    opacity:0;
    pointer-events:none;
    transition:opacity 1.4s ease;
  }
  #fade.visible {
    opacity:1;
  }
</style>
</head>

<body>

<div id="halo"></div>
<div id="fade"></div>

<script>
// бесшумный вход
function openNext(){
  const f = document.getElementById('fade');
  f.classList.add('visible');

  // Переход в зеркало GENESIS
  setTimeout(()=>{
    window.location.href = "file:///home/arc/GENESIS/VAULT/_DOOR/ZERKALO.html";
  },1400);
}

document.addEventListener("click", openNext);
document.addEventListener("keydown", openNext);
</script>

</body>
</html>
